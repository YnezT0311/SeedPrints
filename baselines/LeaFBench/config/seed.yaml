fingerprint_method: 'seed'
cached_fingerprints_path: 'cache/seed/seed_fingerprints.pth'
re_fingerprinting: False
fingerprint_type: 'white-box'
seed: 42

# Input type: "token" (default, recommended) or "embedding"
input_type: 'token'
random_input_path: 'cache/seed/fingerprint_input'
num_sequences: 2000
seq_length: 1024
min_vocab_size: 32000
batch_size: 4

# SeedPrint parameters
ratio_k: 0.10
normalize: 'softmax_T10'
identity_mode: 'coset'
use_agg: False
